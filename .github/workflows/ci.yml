name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      # TLS stack is pinned to rustls/ring only. aws-lc-rs needs cmake/nasm on
      # Windows and panics at runtime if a second provider sneaks in.
      - name: Forbid aws-lc in the dependency tree
        shell: bash
        run: "! cargo tree --workspace | grep -q aws-lc"
