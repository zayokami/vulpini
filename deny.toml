# cargo-deny configuration: license audit for an MIT project.
# Run: cargo deny check licenses

[licenses]
# MIT itself plus the permissive licenses compatible with it.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

confidence-threshold = 0.8
